url: https://ggseg.github.io/ggseg3d/

template:
  bootstrap: 5
  light-switch: true
  bslib:
    primary: "#29393e"
    secondary: "#5e3c58"
    success: "#478f76"
    danger: "#CD6689"
    bg: "#f2f0ef"
    fg: "#1a2a2e"
    base_font:
      google: Inter
    code_font:
      google: JetBrains Mono
    code-bg: "#cec4cc"
    code-color: "#1a2a2e"
    link-color: "#29393e"
    link-hover-color: "#5e3c58"
    border-color: "#a8c5cb"
    navbar-bg: "#29393e"
    navbar-light-color: "#f2f0ef"

navbar:
  bg: primary
  type: dark
  structure:
    left: [intro, reference, articles, news]
    right: [search, github, lightswitch]
  components:
    github:
      icon: fa-github
      href: https://github.com/ggseg/ggseg3d
      aria-label: GitHub

articles:
  - title: Getting Started
    navbar: ~
    contents:
      - ggseg3d
      - rayshader
      - shiny

reference:
  - title: Plotting
    desc: Core 3D visualization function
    contents:
      - ggseg3d
      - ggsegray

  - title: Widget Customization
    desc: Pipe-friendly functions to modify the 3D widget
    contents:
      - pan_camera
      - add_glassbrain
      - starts_with("set")
      - snapshot_brain

  - title: Mesh Utilities
    desc: Work with brain surface meshes
    contents:
      - get_brain_mesh

  - title: Shiny
    desc: Shiny integration
    contents:
      - ggseg3dOutput
      - renderGgseg3d
      - updateGgseg3dCamera
      - updateGgseg3dBackground
